<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SimpleExfil</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      min-height: 100vh;
    }

    /* ---------- Login overlay ---------- */
    #login-overlay {
      position: fixed; inset: 0;
      background: #0d1117;
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
    }
    #login-overlay.hidden { display: none; }
    .login-box {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 40px;
      width: 360px;
      text-align: center;
    }
    .login-box h1 {
      font-size: 22px;
      color: #e6edf3;
      margin-bottom: 6px;
    }
    .login-box p {
      font-size: 13px;
      color: #8b949e;
      margin-bottom: 24px;
    }
    .login-box input {
      width: 100%;
      padding: 10px 14px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: #0d1117;
      color: #e6edf3;
      font-size: 14px;
      outline: none;
      transition: border-color .15s;
    }
    .login-box input:focus { border-color: #58a6ff; }
    .login-box button {
      margin-top: 14px;
      width: 100%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      background: #238636;
      color: #fff;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
    }
    .login-box button:hover { background: #2ea043; }
    .login-error {
      margin-top: 12px;
      font-size: 13px;
      color: #f85149;
      min-height: 18px;
    }

    /* ---------- Main app ---------- */
    #app { display: none; max-width: 800px; margin: 0 auto; padding: 32px 20px; }
    #app.visible { display: block; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 28px;
    }
    header h1 { font-size: 22px; color: #e6edf3; }
    header .badge {
      font-size: 11px;
      background: #238636;
      color: #fff;
      padding: 3px 8px;
      border-radius: 12px;
      font-weight: 600;
    }

    /* ---------- Dropzone ---------- */
    #dropzone {
      border: 2px dashed #30363d;
      border-radius: 10px;
      padding: 40px 20px;
      text-align: center;
      color: #8b949e;
      cursor: pointer;
      transition: border-color .2s, background .2s;
      margin-bottom: 28px;
    }
    #dropzone:hover, #dropzone.hover {
      border-color: #58a6ff;
      background: rgba(88,166,255,.05);
    }
    #dropzone .icon { font-size: 36px; margin-bottom: 8px; }
    #dropzone .label { font-size: 14px; }
    #dropzone .sub { font-size: 12px; margin-top: 4px; color: #484f58; }

    /* ---------- Status toast ---------- */
    #status {
      margin-bottom: 20px;
      padding: 10px 14px;
      border-radius: 6px;
      font-size: 13px;
      display: none;
    }
    #status.success { display: block; background: #0d2818; border: 1px solid #238636; color: #3fb950; }
    #status.error   { display: block; background: #2d1117; border: 1px solid #f85149; color: #f85149; }

    /* ---------- File list ---------- */
    .section-title {
      font-size: 14px;
      font-weight: 600;
      color: #8b949e;
      text-transform: uppercase;
      letter-spacing: .5px;
      margin-bottom: 12px;
    }
    #file-list {
      border: 1px solid #21262d;
      border-radius: 8px;
      overflow: hidden;
    }
    .file-row {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #21262d;
      font-size: 13px;
      transition: background .1s;
    }
    .file-row:last-child { border-bottom: none; }
    .file-row:hover { background: #161b22; }
    .file-name {
      flex: 1;
      color: #58a6ff;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .file-size {
      width: 80px;
      text-align: right;
      color: #8b949e;
      margin-right: 16px;
      flex-shrink: 0;
    }
    .file-dl {
      padding: 4px 12px;
      border: 1px solid #30363d;
      border-radius: 6px;
      background: transparent;
      color: #c9d1d9;
      font-size: 12px;
      cursor: pointer;
      text-decoration: none;
      transition: border-color .15s, background .15s;
      flex-shrink: 0;
    }
    .file-dl:hover {
      background: #30363d;
      border-color: #8b949e;
    }
    .empty-state {
      padding: 32px;
      text-align: center;
      color: #484f58;
      font-size: 13px;
    }
  </style>
</head>
<body>

<!-- Login overlay -->
<div id="login-overlay" class="hidden">
  <div class="login-box">
    <h1>SimpleExfil</h1>
    <p>Enter the server password to continue</p>
    <form id="login-form">
      <input type="password" id="pw-input" placeholder="Password" autocomplete="off" autofocus />
      <button type="submit">Unlock</button>
    </form>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <header>
    <h1>SimpleExfil</h1>
    <span class="badge" id="file-count-badge">0 files</span>
  </header>

  <div id="dropzone">
    <div class="icon">&#8682;</div>
    <div class="label">Drag &amp; drop files here or click to select</div>
    <div class="sub">Files are stored in the server vault</div>
  </div>
  <input type="file" id="fileinput" style="display:none" multiple />

  <div id="status"></div>

  <div class="section-title">Vault</div>
  <div id="file-list">
    <div class="empty-state">No files uploaded yet</div>
  </div>
</div>

<script>
const $ = (sel) => document.querySelector(sel);
const overlay  = $("#login-overlay");
const app      = $("#app");
const dropzone = $("#dropzone");
const fileInput = $("#fileinput");
const statusEl = $("#status");
const fileList = $("#file-list");
const badge    = $("#file-count-badge");

// ---- Auth flow ----
async function checkAuth() {
  try {
    const res = await fetch("/api/check-auth");
    const data = await res.json();
    if (!data.required || data.authenticated) {
      showApp();
    } else {
      overlay.classList.remove("hidden");
      $("#pw-input").focus();
    }
  } catch {
    showApp();
  }
}

$("#login-form").addEventListener("submit", async (e) => {
  e.preventDefault();
  const pw = $("#pw-input").value;
  const errEl = $("#login-error");
  errEl.textContent = "";
  try {
    const res = await fetch("/api/auth", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ password: pw }),
    });
    if (res.ok) {
      showApp();
    } else {
      errEl.textContent = "Wrong password";
      $("#pw-input").select();
    }
  } catch {
    errEl.textContent = "Connection failed";
  }
});

function showApp() {
  overlay.classList.add("hidden");
  app.classList.add("visible");
  loadFiles();
}

// ---- Upload ----
dropzone.addEventListener("click", () => fileInput.click());
dropzone.addEventListener("dragover", (e) => { e.preventDefault(); dropzone.classList.add("hover"); });
dropzone.addEventListener("dragleave", () => dropzone.classList.remove("hover"));
dropzone.addEventListener("drop", (e) => {
  e.preventDefault();
  dropzone.classList.remove("hover");
  [...e.dataTransfer.files].forEach(upload);
});
fileInput.addEventListener("change", () => {
  [...fileInput.files].forEach(upload);
  fileInput.value = "";
});

async function upload(file) {
  const fd = new FormData();
  fd.append("file", file);
  try {
    const res = await fetch("/", { method: "POST", body: fd });
    const text = await res.text();
    if (res.ok) {
      showStatus(text.trim(), "success");
    } else {
      showStatus("Upload failed: " + text.trim(), "error");
    }
  } catch {
    showStatus("Upload failed: network error", "error");
  }
  loadFiles();
}

function showStatus(msg, type) {
  statusEl.textContent = msg;
  statusEl.className = type;
  clearTimeout(statusEl._t);
  statusEl._t = setTimeout(() => { statusEl.className = ""; statusEl.style.display = "none"; }, 4000);
}

// ---- File listing ----
async function loadFiles() {
  try {
    const res = await fetch("/api/files");
    if (!res.ok) return;
    const files = await res.json();
    badge.textContent = files.length + " file" + (files.length !== 1 ? "s" : "");
    if (files.length === 0) {
      fileList.innerHTML = '<div class="empty-state">No files uploaded yet</div>';
      return;
    }
    fileList.innerHTML = files.map((f) => `
      <div class="file-row">
        <span class="file-name" title="${esc(f.name)}">${esc(f.name)}</span>
        <span class="file-size">${esc(f.size_human)}</span>
        <a class="file-dl" href="/download/${encodeURIComponent(f.name)}">Download</a>
      </div>
    `).join("");
  } catch { /* ignore */ }
}

function esc(s) {
  const d = document.createElement("div");
  d.textContent = s;
  return d.innerHTML;
}

checkAuth();
</script>
</body>
</html>
